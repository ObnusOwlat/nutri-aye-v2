<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri Aye</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/patients.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2322c55e'/><text x='50' y='68' text-anchor='middle' font-size='55' font-family='system-ui' font-weight='bold' fill='white'>N</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header__container">
            <h1 class="header__title">Nutri Aye</h1>
            <div class="header__actions">
                <button class="btn btn--secondary btn--sm" id="btn-sync" title="Sync with backend">
                    <span class="btn__icon">&#8635;</span>
                    <span class="btn__text">Sync</span>
                </button>
                <button class="btn btn--secondary btn--sm" id="btn-print" title="Print view">
                    <span class="btn__icon">&#9632;</span>
                    <span class="btn__text">Print</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
        <div class="tabs__container">
            <button class="tabs__tab active" data-tab="patients">
                <span class="tabs__icon">&#128100;</span>
                <span class="tabs__label">Patients</span>
            </button>
            <button class="tabs__tab" data-tab="planner">
                <span class="tabs__icon">&#128197;</span>
                <span class="tabs__label">Planner</span>
            </button>
            <button class="tabs__tab" data-tab="ingredients">
                <span class="tabs__icon">&#127813;</span>
                <span class="tabs__label">Ingredients</span>
            </button>
            <button class="tabs__tab" data-tab="recipes">
                <span class="tabs__icon">&#128214;</span>
                <span class="tabs__label">Recipes</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <!-- Planner Tab -->
        <section class="tab-content" id="tab-planner">
            <div class="planner">
                <!-- Patient Context Bar -->
                <div class="planner__patient-bar" id="planner-patient-bar">
                    <div class="planner__patient-selector">
                        <label>Patient:</label>
                        <select id="planner-patient-select" class="form-select">
                            <option value="">-- No patient selected --</option>
                        </select>
                    </div>
                    <div class="planner__patient-info" id="planner-patient-info" style="display:none;">
                        <span class="planner__patient-goal" id="planner-patient-goal"></span>
                        <span class="planner__patient-target" id="planner-patient-target"></span>
                        <span class="planner__patient-restrictions" id="planner-patient-restrictions"></span>
                        <span class="planner__patient-metrics" id="planner-patient-metrics"></span>
                    </div>
                </div>

                <div class="planner__header">
                    <div class="planner__template-section">
                        <div class="planner__template-selector">
                            <label class="planner__template-label">Diet Template:</label>
                            <select id="planner-template-select" class="form-select">
                                <option value="">-- Custom --</option>
                            </select>
                            <button class="btn btn--secondary btn--sm" id="btn-manage-templates" title="Manage Templates">Templates</button>
                        </div>
                        <div class="planner__diet-info">
                            <span class="planner__diet-goal" id="planner-diet-goal">Maintenance</span>
                            <span class="planner__diet-target" id="planner-diet-target">2000 kcal/day</span>
                        </div>
                    </div>
                    <div class="calorie-summary">
                        <div class="calorie-summary__item">
                            <span class="calorie-summary__label">Daily Target:</span>
                            <input type="number" class="calorie-summary__input" id="daily-target" value="2000" min="800" max="10000">
                            <span class="calorie-summary__unit">kcal</span>
                        </div>
                        <div class="calorie-summary__item">
                            <span class="calorie-summary__label">Weekly Avg:</span>
                            <span class="calorie-summary__value" id="weekly-avg">0</span>
                            <span class="calorie-summary__unit">kcal</span>
                        </div>
                    </div>
                    <div class="planner__actions">
                        <button class="btn btn--primary" id="btn-save-patient-plan">Save to Patient</button>
                        <button class="btn btn--danger" id="btn-clear-week">Clear Week</button>
                    </div>
                </div>
                <div class="week-grid" id="week-grid"></div>
            </div>
        </section>

        <!-- Ingredients Tab -->
        <section class="tab-content" id="tab-ingredients">
            <div class="ingredients">
                <div class="ingredients__header">
                    <h2 class="section-title">Manage Ingredients</h2>
                    <div class="ingredients__actions">
                        <button class="btn btn--danger" id="btn-delete-all-ingredients">
                            <span class="btn__icon">🗑</span> Delete All
                        </button>
                        <button class="btn btn--secondary" id="btn-import-json">
                            <span class="btn__icon">⬆</span> Import JSON
                        </button>
                        <button class="btn btn--secondary" id="btn-import-csv">
                            <span class="btn__icon">⬆</span> Import CSV
                        </button>
                        <button class="btn btn--secondary" id="btn-export-csv">
                            <span class="btn__icon">⬇</span> Export CSV
                        </button>
                        <button class="btn btn--primary" id="btn-add-ingredient">
                            <span class="btn__icon">+</span> Add Ingredient
                        </button>
                    </div>
                </div>
                <div class="search-bar" style="margin: 12px 0;">
                    <input type="text" id="ingredient-search" class="form-input" placeholder="Search ingredients..." style="width: 100%;">
                </div>
                <div class="category-filter">
                    <button class="category-filter__btn active" data-category="all">All</button>
                    <button class="category-filter__btn" data-category="protein">Protein</button>
                    <button class="category-filter__btn" data-category="carbs">Carbs</button>
                    <button class="category-filter__btn" data-category="fats">Fats</button>
                    <button class="category-filter__btn" data-category="vegetables">Vegetables</button>
                    <button class="category-filter__btn" data-category="mixed">Mixed</button>
                </div>
                <div class="ingredients__list" id="ingredients-list"></div>
            </div>
        </section>

        <!-- Recipes Tab -->
        <section class="tab-content" id="tab-recipes">
            <div class="recipes">
                <div class="recipes__header">
                    <h2 class="section-title">Recipe Book</h2>
                    <button class="btn btn--primary" id="btn-add-recipe">
                        <span class="btn__icon">+</span> Create Recipe
                    </button>
                </div>
                <div class="category-filter">
                    <button class="category-filter__btn active" data-category="all">All</button>
                    <button class="category-filter__btn" data-category="protein">Protein</button>
                    <button class="category-filter__btn" data-category="carbs">Carbs</button>
                    <button class="category-filter__btn" data-category="fats">Fats</button>
                    <button class="category-filter__btn" data-category="vegetables">Vegetables</button>
                    <button class="category-filter__btn" data-category="mixed">Mixed</button>
                </div>
                <div class="recipes__grid" id="recipes-grid"></div>
            </div>
        </section>

        <!-- Patients Tab -->
        <section class="tab-content active" id="tab-patients">
            <!-- Patient List View -->
            <div class="patients" id="patients-list-container">
                <div class="patients__header">
                    <h2 class="section-title">Patients</h2>
                    <button class="btn btn--primary" id="btn-add-patient">
                        <span class="btn__icon">+</span> Add Patient
                    </button>
                </div>
                <div class="patients__search">
                    <input type="text" id="patient-search" class="form-input" 
                           placeholder="Search patients by name, email, or phone...">
                </div>
                <div class="patients__list" id="patients-list"></div>
            </div>

            <!-- Patient Profile View -->
            <div class="patient-profile hidden" id="patient-profile">
                <button class="btn btn--secondary btn-back" id="btn-back-to-list">
                    ← Back to List
                </button>
                
                <div class="patient-profile__header">
                    <!-- Rendered by JS -->
                </div>

                <!-- Patient Tabs -->
                <nav class="patient-tabs">
                    <button class="patient-tabs__tab active" data-tab="overview">Overview</button>
                    <button class="patient-tabs__tab" data-tab="metrics">Metrics</button>
                    <button class="patient-tabs__tab" data-tab="conditions">Conditions</button>
                    <button class="patient-tabs__tab" data-tab="plans">Meal Plans</button>
                    <button class="patient-tabs__tab" data-tab="progress">Progress</button>
                </nav>

                <!-- Tab Content -->
                <div class="patient-tab-content active" data-tab="overview"></div>
                <div class="patient-tab-content" data-tab="metrics"></div>
                <div class="patient-tab-content" data-tab="conditions"></div>
                <div class="patient-tab-content" data-tab="plans"></div>
                <div class="patient-tab-content" data-tab="progress"></div>
            </div>
        </section>
    </main>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target === this) UI.closeModal()">
        <div class="modal" id="modal">
            <div class="modal__header">
                <h3 class="modal__title" id="modal-title">Modal Title</h3>
                <button class="modal__close" id="modal-close" onclick="UI.closeModal()">×</button>
            </div>
            <div class="modal__body" id="modal-body"></div>
            <div class="modal__footer" id="modal-footer">
                <button class="btn btn--secondary" id="modal-cancel" onclick="UI.closeModal()">Cancel</button>
                <button class="btn btn--primary" id="modal-confirm" onclick="UI.handleConfirmClick()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ingredients.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/planner.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/patients.js"></script>
    <script src="js/metrics.js"></script>
    <script src="js/conditions.js"></script>
    <script src="js/patient-plan.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
